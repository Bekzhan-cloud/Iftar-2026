<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на Ифтар 🌙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #4a148c;
            font-size: 28px;
            margin-bottom: 35px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        #yesBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            position: relative;
        }

        #yesBtn:hover {
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #noBtn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            position: relative;
            transition: none; /* Убираем transition для мгновенного перемещения */
        }

        #noBtn:hover {
            transform: scale(1.05);
        }

        #noBtn.moving {
            position: fixed;
            z-index: 1000;
            transition: none; /* Мгновенное перемещение */
        }

        .success-content {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-content h2 {
            color: #4a148c;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .success-content p {
            color: #555;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .cat-img {
            width: 240px;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .whatsapp-btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        .emoji {
            font-size: 24px;
            margin-left: 8px;
        }

        .tenor-gif-embed {
            margin-bottom: 25px;
            max-width: 250px;
            margin-left: auto;
            margin-right: auto;
        }

        .tenor-gif-embed iframe {
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container" id="mainCard">
            <div id="questionArea">
                <div class="tenor-gif-embed" data-postid="13894192943523802126" data-share-method="host" data-aspect-ratio="0.674757" data-width="100%"><a href="https://tenor.com/view/%D8%B3%D8%AA%D9%8A%D9%83%D8%B1-%D9%85%D8%AA%D8%AD%D8%B1%D9%83%D8%A9-%D8%B3%D8%A8%D8%AD%D9%87-%D8%AF%D8%B4%D8%AF%D8%A7%D8%B4%D9%87-%D9%82%D8%B7-%D9%85%D8%B3%D9%84%D9%85-muslim-cat-gif-13894192943523802126">ستيكر متحركة سبحه Sticker</a>from <a href="https://tenor.com/search/%D8%B3%D8%AA%D9%8A%D9%83%D8%B1+%D9%85%D8%AA%D8%AD%D8%B1%D9%83%D8%A9-stickers">ستيكر متحركة Stickers</a></div>
                <h1>Пойдешь на ифтар 18 марта? 🌙✨</h1>
                <div class="buttons">
                    <button id="yesBtn">Конечно!</button>
                    <button id="noBtn">Нет</button>
                </div>
            </div>

        <div class="success-content" id="successArea">
            <img src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif" alt="Happy Cat" class="cat-img">
            <h2>ОТЛИЧНО, БРО! 🔥</h2>
            <p>Записал тебя. 18 марта, не опаздывай, будет мощный ифтар! 🍽️</p>
            <a href="https://chat.whatsapp.com/Klj9FhCNV3x4MrOWFesqmA?mode=gi_t" class="whatsapp-btn" target="_blank">
                Присоединиться к группе<span class="emoji">💬</span>
            </a>
        </div>
    </div>
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionArea = document.getElementById('questionArea');
        const successArea = document.getElementById('successArea');

        let yesScale = 1; // Начальный размер кнопки "Конечно"

        const phrases = [
            "Точно нет?", 
            "Подумай еще!", 
            "Мама не пустит?", 
            "А если за мой счет?", 
            "Кнопка сломалась?", 
            "Даже не пытайся"
        ];

        // Функция убегания кнопки
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.classList.add('moving');
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Меняем текст кнопки для прикола
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            noBtn.innerText = randomPhrase;

            // Увеличиваем кнопку "Конечно"
            yesScale += 0.2;
            yesBtn.style.transform = `scale(${yesScale})`;
            
            // Увеличиваем также размер шрифта
            const newFontSize = 18 + (yesScale - 1) * 5;
            yesBtn.style.fontSize = newFontSize + 'px';
        });

        // При клике на "Да"
        yesBtn.addEventListener('click', () => {
            questionArea.style.display = 'none';
            successArea.style.display = 'block';
        });
    </script>
</body>
</html>
